llm:
  provider: deepseek
  model: deepseek-chat
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com

vision_llm:
  enabled: false
  provider: azure
  model: gpt-4o
  api_key: ${AZURE_OPENAI_API_KEY}
  azure_endpoint: ${AZURE_OPENAI_ENDPOINT}
  api_version: 2024-02-15-preview
  deployment_name: ${AZURE_OPENAI_VISION_DEPLOYMENT}
  max_image_size: 2048
  max_tokens: 1000

embedding:
  provider: ollama
  model: nomic-embed-text
  api_key: ${EMBEDDING_API_KEY}
  base_url: ${EMBEDDING_BASE_URL}

splitter:
  provider: recursive
  chunk_size: 1000
  chunk_overlap: 200

vector_store:
  backend: chroma
  persist_path: ./data/db/chroma
  collection_name: chunks

retrieval:
  sparse_backend: bm25
  fusion_algorithm: rrf
  top_k_dense: 20
  top_k_sparse: 20
  top_k_final: 10

rerank:
  backend: none
  model: ""
  top_m: 30

evaluation:
  backends: [custom]
  golden_test_set: ./tests/fixtures/golden_test_set.json

observability:
  enabled: true
  log_file: ./logs/traces.jsonl

ingestion:
  chunk_refiner:
    use_llm: true
  metadata_enricher:
    use_llm: true
